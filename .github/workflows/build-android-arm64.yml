name: Build xz Android ARM64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            gettext \
            autopoint \
            wget \
            unzip

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Setup toolchain
        run: |
          echo "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "CC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" >> $GITHUB_ENV

      - name: Generate configure
        run: |
          chmod +x autogen.sh || true
          ./autogen.sh

      - name: Configure build
        run: |
          ./configure \
            --host=aarch64-linux-android \
            --disable-shared \
            --enable-static \
            LDFLAGS="-static" \
            --prefix=$PWD/out

      - name: Compile
        run: |
          make -j$(nproc)
          make install

      - name: Strip binary
        run: |
          $STRIP out/bin/xz

      - name: Verify binary
        run: |
          file out/bin/xz
          ls -lh out/bin/xz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz-android-arm64
          path: out/bin/xz
