name: local Build xz Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            gettext \
            autopoint \
            pkg-config \
            wget \
            unzip \
            file

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Setup toolchain
        run: |
          echo "TOOLCHAIN=$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Generate configure
        run: |
          ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            CC=$TOOLCHAIN/aarch64-linux-android21-clang \
            --host=aarch64-linux-android \
            --enable-static \
            --disable-shared \
            --disable-lzmadec \
            --disable-lzmainfo \
            --disable-xzdec \
            --disable-scripts

      - name: Build
        run: |
          make -j$(nproc)

      - name: Prepare binary
        run: |
          mkdir release
          cp src/xz/xz release/xz

      - name: Verify
        run: |
          file release/xz

      - uses: actions/upload-artifact@v4
        with:
          name: xz
          path: release/xz
