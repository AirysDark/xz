name: local Build xz Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            gettext \
            autopoint \
            wget \
            unzip \
            file

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Setup toolchain
        run: |
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Generate configure
        run: |
          chmod +x autogen.sh
          ./autogen.sh

      - name: Configure build
        run: |
          export CC=$TOOLCHAIN/aarch64-linux-android21-clang
          export CXX=$TOOLCHAIN/aarch64-linux-android21-clang++
          export AR=$TOOLCHAIN/llvm-ar
          export RANLIB=$TOOLCHAIN/llvm-ranlib
          export STRIP=$TOOLCHAIN/llvm-strip

          export SYSROOT=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          export CFLAGS="--sysroot=$SYSROOT"
          export LDFLAGS="--sysroot=$SYSROOT"

          ./configure \
            --host=aarch64-linux-android \
            --disable-shared \
            --enable-static

      - name: Compile
        run: |
          make -j$(nproc)

      - name: Prepare binary
        run: |
          mkdir release
          cp src/xz/xz release/xz
          chmod +x release/xz

      - name: Verify binary
        run: |
          file release/xz

      - uses: actions/upload-artifact@v4
        with:
          name: xz
          path: release/xz
