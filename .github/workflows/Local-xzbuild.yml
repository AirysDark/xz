name: local Build xz Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            gettext \
            autopoint \
            wget \
            unzip \
            file

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Setup NDK toolchain
        run: |
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Generate configure script
        run: |
          chmod +x autogen.sh
          ./autogen.sh

      - name: Configure build
        run: |
          ./configure \
            CC=$TOOLCHAIN/aarch64-linux-android21-clang \
            AR=$TOOLCHAIN/llvm-ar \
            RANLIB=$TOOLCHAIN/llvm-ranlib \
            --host=aarch64-linux-gnu \
            --disable-shared \
            --enable-static \
            LDFLAGS="-static"

      - name: Compile xz
        run: |
          make -j$(nproc)

      - name: Prepare binary
        run: |
          mkdir release
          cp src/xz/xz release/xz
          chmod +x release/xz

      - name: Verify binary
        run: |
          file release/xz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz
          path: release/xz
