name: Build xz Android ARM64

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label"
        required: false
        default: "custom"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential unzip wget file

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Setup NDK toolchain
        run: |
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Build xz
        run: |
          export CC=$TOOLCHAIN/aarch64-linux-android21-clang
          export AR=$TOOLCHAIN/llvm-ar
          export RANLIB=$TOOLCHAIN/llvm-ranlib

          cd xz

          ./configure \
            --host=aarch64-linux-android \
            --disable-shared \
            --enable-static \
            LDFLAGS="-static"

          make -j$(nproc)

      - name: Prepare binary
        run: |
          mkdir release
          cp xz/src/xz/xz release/xz
          chmod +x release/xz

      - name: Verify binary
        run: |
          file release/xz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz
          path: release/xz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xz-${{ github.event.inputs.version }}
          name: xz Android ARM64
          files: release/xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
