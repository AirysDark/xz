name: Build xz Android ARM64

on:
  workflow_dispatch:
    inputs:
      version:
        description: "XZ version to build"
        required: true
        default: "5.4.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        run: echo "XZ_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential wget unzip file

      - name: Extract xz source from repo
        run: |
          tar xf xz-${XZ_VERSION}.tar.gz

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Build static xz for Android ARM64
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin

          export CC=$TOOLCHAIN/aarch64-linux-android21-clang
          export AR=$TOOLCHAIN/llvm-ar
          export RANLIB=$TOOLCHAIN/llvm-ranlib

          cd xz-${XZ_VERSION}

          ./configure \
            --host=aarch64-linux-android \
            --disable-shared \
            --enable-static \
            LDFLAGS="-static"

          make -j$(nproc)

      - name: Prepare binary
        run: |
          mkdir release
          cp xz-${XZ_VERSION}/src/xz/xz release/xz
          chmod +x release/xz

      - name: Verify binary
        run: |
          file release/xz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz
          path: release/xz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xz-${{ env.XZ_VERSION }}
          name: xz-${{ env.XZ_VERSION }} Android ARM64
          files: release/xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
