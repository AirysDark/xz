name: Build xz Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download xz source
        run: |
          wget https://tukaani.org/xz/xz-5.4.6.tar.gz
          tar xf xz-5.4.6.tar.gz

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential wget unzip

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Build xz
        run: |
          export NDK=$PWD/android-ndk-r26d
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          export CC=$TOOLCHAIN/aarch64-linux-android21-clang

          cd xz-5.4.6

          ./configure \
            --host=aarch64-linux-android \
            --disable-shared \
            --enable-static \
            LDFLAGS="-static"

          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz-android-arm64
          path: xz-5.4.6/src/xz/xz
